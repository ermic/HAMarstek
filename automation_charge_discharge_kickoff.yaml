id: marstek_charge_discharge_kickoff
alias: Marstek charge/discharge daily kickoff
description: >
  Geeft één laad-startschot en één ontlaad-startschot per dag, op basis
  van de goedkoopste/duurste uren in de Zonneplan-forecast voor vandaag.
  Laden in venster 00:00-17:00, ontladen in 17:00-23:00.
mode: single
trigger:
  - platform: time_pattern
    hours: "/1"
    minutes: 0
variables:
  charge_hour: |
    {% set today_local = now().strftime('%Y-%m-%d') %}
    {% set forecast = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [] %}
    {% set ns = namespace(hours=[]) %}
    {% for f in forecast %}
      {% set ts_local = as_local(as_datetime(f.datetime)) %}
      {% set d = ts_local.strftime('%Y-%m-%d') %}
      {% set h = ts_local.hour %}
      {% if d == today_local and h < 17 %}
        {% set ns.hours = ns.hours + [{'hour': h, 'price': f.electricity_price | float(0) / 10000000}] %}
      {% endif %}
    {% endfor %}
    {% set bns = namespace(blocks=[], current=[]) %}
    {% for h in ns.hours | sort(attribute='hour') %}
      {% if h.price < 0 %}
        {% set bns.current = bns.current + [h] %}
      {% else %}
        {% if bns.current | length > 0 %}
          {% set bns.blocks = bns.blocks + [bns.current] %}
          {% set bns.current = [] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% if bns.current | length > 0 %}
      {% set bns.blocks = bns.blocks + [bns.current] %}
    {% endif %}
    {% set ans = namespace(items=[]) %}
    {% for b in bns.blocks %}
      {% set ans.items = ans.items + [{'block': b, 'len': b | length, 'start': b[0].hour}] %}
    {% endfor %}
    {% set rns = namespace(charge_hour=none) %}
    {% if ans.items | length > 0 %}
      {% set best = ans.items | sort(attribute='start') | sort(attribute='len', reverse=true) | first %}
      {% if best.len <= 5 %}
        {% set rns.charge_hour = best.block[0].hour %}
      {% else %}
        {% set rns.charge_hour = (best.block | sort(attribute='price') | first).hour %}
      {% endif %}
    {% else %}
      {% if ns.hours | length > 0 %}
        {% set rns.charge_hour = (ns.hours | sort(attribute='price') | first).hour %}
      {% endif %}
    {% endif %}
    {{ rns.charge_hour }}
  discharge_hour: |
    {% set today_local = now().strftime('%Y-%m-%d') %}
    {% set forecast = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [] %}
    {% set ns = namespace(hours=[]) %}
    {% for f in forecast %}
      {% set ts_local = as_local(as_datetime(f.datetime)) %}
      {% set d = ts_local.strftime('%Y-%m-%d') %}
      {% set h = ts_local.hour %}
      {% if d == today_local and h >= 17 and h < 23 %}
        {% set ns.hours = ns.hours + [{'hour': h, 'price': f.electricity_price | float(0) / 10000000}] %}
      {% endif %}
    {% endfor %}
    {% if ns.hours | length > 0 %}
      {{ (ns.hours | sort(attribute='price', reverse=true) | first).hour }}
    {% else %}
      {{ none }}
    {% endif %}
  current_hour: "{{ now().hour }}"
action:
  - service: logbook.log
    data:
      name: Marstek debug
      message: |
        {% set first = (state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [{}]) | first %}
        now={{ now() }} | current_hour={{ current_hour }} | charge_hour={{ charge_hour }} | discharge_hour={{ discharge_hour }} | first.datetime={{ first.datetime }} | parsed={{ as_datetime(first.datetime) }} | as_local={{ as_local(as_datetime(first.datetime)) }} | local_hour={{ as_local(as_datetime(first.datetime)).hour }}
  - choose:
      - alias: Laad-startschot
        conditions:
          - condition: template
            value_template: "{{ charge_hour | int(-1) == current_hour | int }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.marstek_venus_modbus_rs485_control_mode
          - service: select.select_option
            target:
              entity_id:
                - select.marstek_venus_modbus_force_mode
                - select.marstek_venus_modbus_force_mode_2
            data:
              option: charge
          - delay: "00:00:05"
          - service: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_charge_power
            data:
              value: 1250
          - service: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_charge_power_2
            data:
              value: 1250
          - service: logbook.log
            data:
              name: Marstek
              message: "Laad-startschot gevuurd op uur {{ current_hour }}"
      - alias: Ontlaad-startschot
        conditions:
          - condition: template
            value_template: "{{ discharge_hour | int(-1) == current_hour | int }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.marstek_venus_modbus_rs485_control_mode
          - service: select.select_option
            target:
              entity_id:
                - select.marstek_venus_modbus_force_mode
                - select.marstek_venus_modbus_force_mode_2
            data:
              option: discharge
          - delay: "00:00:05"
          - service: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_discharge_power
            data:
              value: 2500
          - service: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_discharge_power_2
            data:
              value: >
                {{ 200 if states('sensor.marstek_venus_modbus_2_battery_soc') | float(0) < 50 else 2500 }}
          - service: logbook.log
            data:
              name: Marstek
              message: "Ontlaad-startschot gevuurd op uur {{ current_hour }}"
    default:
      - service: logbook.log
        data:
          name: Marstek debug
          message: "Geen match: current_hour={{ current_hour }}, charge_hour={{ charge_hour }}, discharge_hour={{ discharge_hour }}"
