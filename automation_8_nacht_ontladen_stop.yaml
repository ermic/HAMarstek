id: marstek_v3_nacht_ontladen_stop
alias: "Marstek v3 – Stop Nacht Ontladen Bij 10% SoC"
description: >
  Stopt het nacht-ontladen als SoC onder 10% zakt en schakelt naar anti_feed.
  Geldt alleen in zomermaanden wanneer automation 7 actief kan zijn.
mode: single

trigger:
  - platform: numeric_state
    entity_id: sensor.marstek_venus_modbus_battery_soc
    below: 10

condition:
  - condition: time
    after: "00:00:00"
    before: "08:00:00"
  - condition: template
    value_template: "{{ now().month >= 3 and now().month <= 9 }}"
  - condition: template
    value_template: "{{ states('select.marstek_venus_modbus_force_mode') == 'discharge' }}"

action:
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_force_mode
    data:
      option: stop
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_user_work_mode
    data:
      option: anti_feed
  - service: system_log.write
    data:
      message: "Marstek v3: Nacht ontladen gestopt, SoC={{ states('sensor.marstek_venus_modbus_battery_soc') }}% (minimum 10%)"
      level: warning
