- id: '1784295274878'
  alias: Marstek RS485 keepalive
  description: Houdt de RS485-controlemodus actief zodat de accu niet terugvalt
  triggers:
  - trigger: time_pattern
    seconds: /20
  conditions:
  - condition: state
    entity_id: input_boolean.input_boolean_marstek_besturing_2
    state: 'on'
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.marstek_venus_modbus_rs485_control_mode_2
  mode: single
