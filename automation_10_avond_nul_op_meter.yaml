id: marstek_v3_avond_nul_op_meter
alias: "Marstek v3 – Avond Nul Op Meter (dynamisch)"
description: >
  Past elke 30 seconden het ontlaadvermogen aan om nul op de meter te houden
  tijdens avonduren (19:30-23:59). Gebruikt het net-vermogen als feedback:
  positief = meer ontladen, negatief = minder ontladen.
  Deadband van 30W voorkomt constante kleine aanpassingen.
  Niet actief bij avond-verkoop (tarief high + SoC > 80%).
mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    seconds: /30

condition:
  - condition: time
    after: "19:30:00"
    before: "23:59:59"
  - condition: state
    entity_id: switch.marstek_venus_modbus_rs485_control_mode
    state: "on"
  # Niet actief als we aan het verkopen zijn
  - condition: template
    value_template: >
      {{ not (states('sensor.zonneplan_current_tariff_group') == 'high'
              and states('sensor.marstek_venus_modbus_battery_soc') | float(0) > 80) }}
  # Minimale SoC
  - condition: numeric_state
    entity_id: sensor.marstek_venus_modbus_battery_soc
    above: 15

action:
  - variables:
      net_vermogen: "{{ states('input_number.marstek_net_power_smooth') | float(0) }}"
      huidig: "{{ states('number.marstek_venus_modbus_set_discharge_power') | int(0) }}"
      gewenst: "{{ [[huidig + (net_vermogen | round(0) | int), 0] | max, 1200] | min }}"

  # Alleen bijsturen als afwijking groter is dan deadband (30W)
  - if:
      - condition: template
        value_template: "{{ (net_vermogen | abs) > 30 }}"
    then:
      - service: select.select_option
        target:
          entity_id: select.marstek_venus_modbus_force_mode
        data:
          option: discharge
      - service: number.set_value
        target:
          entity_id: number.marstek_venus_modbus_set_discharge_power
        data:
          value: "{{ gewenst }}"
