id: marstek_v3_stop_verkoop_lage_soc
alias: "Marstek v3 – Stop Verkoop Bij Lage SoC"
description: "Stopt de avond-verkoop als SoC onder 50% zakt zodat er genoeg capaciteit overblijft."
mode: single

trigger:
  - platform: numeric_state
    entity_id: sensor.marstek_venus_modbus_battery_soc
    below: 50

condition:
  - condition: template
    value_template: "{{ states('select.marstek_venus_modbus_force_mode') == 'discharge' }}"
  - condition: time
    after: "19:30:00"
    before: "23:59:00"

action:
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_force_mode
    data:
      option: stop
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_user_work_mode
    data:
      option: anti_feed
  - service: system_log.write
    data:
      message: "Marstek v3: Verkoop gestopt, SoC te laag ({{ states('sensor.marstek_venus_modbus_battery_soc') }}% < 50%)"
      level: warning
