id: marstek_v3_stop_laden_vol
alias: "Marstek v3 – Stop Laden Bij Vol"
description: "Stopt forceer-laden als SoC boven 99% komt en schakelt naar anti_feed"
mode: single

trigger:
  - platform: numeric_state
    entity_id: sensor.marstek_venus_modbus_battery_soc
    above: 99

condition:
  - condition: template
    value_template: "{{ states('select.marstek_venus_modbus_force_mode') == 'charge' }}"

action:
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_force_mode
    data:
      option: stop
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_user_work_mode
    data:
      option: anti_feed
  - service: system_log.write
    data:
      message: "Marstek v3: Laden gestopt, batterij vol (SoC={{ states('sensor.marstek_venus_modbus_battery_soc') }}%)"
      level: info
