id: marstek_v3_rs485_watchdog
alias: "Marstek v3 – RS485 Watchdog"
description: >
  De Marstek zet de RS485 control mode soms zelf uit als veiligheidsmaatregel.
  Deze automation zet hem direct weer aan zodra hij uitvalt.
  Wacht 10 seconden om te voorkomen dat de schakelaar te snel teruggeschakeld wordt.
mode: single
max_exceeded: silent

trigger:
  - platform: state
    entity_id: switch.marstek_venus_modbus_rs485_control_mode
    to: "off"
    for:
      seconds: 10

action:
  - service: system_log.write
    data:
      message: "Marstek v3: RS485 control mode was uitgevallen, opnieuw inschakelen..."
      level: warning
  - service: switch.turn_on
    target:
      entity_id: switch.marstek_venus_modbus_rs485_control_mode
