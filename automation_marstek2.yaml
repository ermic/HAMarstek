alias: Marstek Slim Laden/Ontladen v2
description: >
  Laadt batterij op zonne-energie. Ontlaadt voor nul op de meter als zon weg is.
  SoC nooit onder 10%, nooit boven 100%. Update elke 15 seconden.
triggers:
  - seconds: /15
    trigger: time_pattern
conditions:
  - condition: template
    value_template: >
      {{ states('sensor.envoy_122250110136_current_power_production') not in
      ['unavailable', 'unknown']
         and states('sensor.marstek_ct_4de1_battery_e3e9_phase_a_power') not in ['unavailable', 'unknown']
         and states('sensor.marstek_venus_modbus_battery_soc') not in ['unavailable', 'unknown'] }}
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ soc < 10 }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_max_discharge_power
            data:
              value: "0"
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_discharge_power
            data:
              value: "0"
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_force_mode
            data:
              option: stop
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_user_work_mode
            data:
              option: anti_feed
      - conditions:
          - condition: template
            value_template: "{{ solar_w > drempel and soc < 100 }}"
        sequence:
          - variables:
              laad_vermogen: "{{ [solar_w, max_power] | min }}"
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_max_charge_power
            data:
              value: "{{ laad_vermogen }}"
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_user_work_mode
            data:
              option: anti_feed
      - conditions:
          - condition: template
            value_template: "{{ solar_w > drempel and soc >= 100 }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_max_charge_power
            data:
              value: "0"
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_charge_power
            data:
              value: "0"
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_force_mode
            data:
              option: stop
      - conditions:
          - condition: template
            value_template: "{{ solar_w <= drempel and ct_power > drempel and soc > 10 }}"
        sequence:
          - variables:
              ontlaad_vermogen: "{{ [(ct_power + 50) | int, max_power] | min }}"
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_user_work_mode
            data:
              option: manual
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_max_discharge_power
            data:
              value: "{{ ontlaad_vermogen }}"
          - action: number.set_value
            target:
              entity_id: number.marstek_venus_modbus_set_discharge_power
            data:
              value: "{{ ontlaad_vermogen }}"
          - action: select.select_option
            target:
              entity_id: select.marstek_venus_modbus_force_mode
            data:
              option: discharge
    default:
      - action: select.select_option
        target:
          entity_id: select.marstek_venus_modbus_force_mode
        data:
          option: stop
      - action: number.set_value
        target:
          entity_id: number.marstek_venus_modbus_max_charge_power
        data:
          value: "0"
      - action: number.set_value
        target:
          entity_id: number.marstek_venus_modbus_set_charge_power
        data:
          value: "0"
      - action: number.set_value
        target:
          entity_id: number.marstek_venus_modbus_max_discharge_power
        data:
          value: "0"
      - action: number.set_value
        target:
          entity_id: number.marstek_venus_modbus_set_discharge_power
        data:
          value: "0"
variables:
  solar_w: >-
    {{ (states('sensor.envoy_122250110136_current_power_production') | float(0)
    * 1000) | int }}
  ct_power: "{{ states('sensor.marstek_ct_4de1_battery_e3e9_phase_a_power') | float(0) }}"
  soc: "{{ states('sensor.marstek_venus_modbus_battery_soc') | float(0) }}"
  max_power: 2500
  drempel: 50
mode: single
max_exceeded: silent
