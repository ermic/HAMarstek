id: marstek_v3_avond_tarief_hoog
alias: "Marstek v3 – Start Verkoop Bij Hoog Avondtarief"
description: "Start verkoop als tarief 60 seconden stabiel op high staat. Bouwt vermogen geleidelijk op (ramp)."
mode: single

trigger:
  - platform: state
    entity_id: sensor.zonneplan_current_tariff_group
    to: "high"
    for:
      seconds: 60

condition:
  - condition: time
    after: "19:30:00"
    before: "23:59:00"
  - condition: numeric_state
    entity_id: sensor.marstek_venus_modbus_battery_soc
    above: 80
  - condition: template
    value_template: "{{ states('sensor.sun_solar_elevation') | float(-90) < 0 }}"
  - condition: state
    entity_id: switch.marstek_venus_modbus_rs485_control_mode
    state: "on"

action:
  # Zet force discharge aan en begin laag
  - service: select.select_option
    target:
      entity_id: select.marstek_venus_modbus_force_mode
    data:
      option: discharge
  - service: number.set_value
    target:
      entity_id: number.marstek_venus_modbus_max_discharge_power
    data:
      value: 2000
  - service: number.set_value
    target:
      entity_id: number.marstek_venus_modbus_set_discharge_power
    data:
      value: 100
  - service: system_log.write
    data:
      message: "Marstek v3: Avond-verkoop gestart, ramp omhoog naar 2000W ({{ states('sensor.zonneplan_current_electricity_tariff') | float(0) | round(3) }} EUR/kWh), SoC={{ states('sensor.marstek_venus_modbus_battery_soc') }}%"
      level: info
  # Ramp omhoog: 200W per stap elke 5 seconden (~50 seconden naar 2000W)
  - repeat:
      while:
        - condition: template
          value_template: "{{ states('number.marstek_venus_modbus_set_discharge_power') | int(0) < 2000 }}"
        - condition: template
          value_template: "{{ states('select.marstek_venus_modbus_force_mode') == 'discharge' }}"
      sequence:
        - delay:
            seconds: 5
        - service: number.set_value
          target:
            entity_id: number.marstek_venus_modbus_set_discharge_power
          data:
            value: "{{ [states('number.marstek_venus_modbus_set_discharge_power') | int(0) + 200, 2000] | min }}"
